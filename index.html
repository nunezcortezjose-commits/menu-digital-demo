<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demo Menú Digital Magdalena</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    text-align:center;
    background:#ffffff;
    padding:20px;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

h1{
    margin-top:10px;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.menu-item{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.whatsapp{
    display:block;
    text-align:center;
    background:#25D366;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
    margin-top:15px;
}

iframe{
    width:100%;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
    <img class="logo" src="https://via.placeholder.com/120" alt="Logo">
    <h1>Tacos El Güero</h1>
</div>

<div class="card">
    <h2>🌮 Menú</h2>

    <div class="menu-item">
        <span>Taco al Pastor</span>
        <span>$25</span>
    </div>

    <div class="menu-item">
        <span>Taco de Asada</span>
        <span>$28</span>
    </div>

    <div class="menu-item">
        <span>Quesadilla</span>
        <span>$45</span>
    </div>
</div>

<div class="card">
    <h2>🕒 Horario</h2>
    <p>Lunes a Domingo</p>
    <p>7:00 PM - 1:00 AM</p>
</div>

<div class="card">
    <h2>📍 Ubicación</h2>

    <iframe
        src="https://maps.google.com/maps?q=Magdalena,Jalisco&t=&z=15&ie=UTF8&iwloc=&output=embed"
        height="250">
    </iframe>
</div>

<div class="card">
    <a class="whatsapp"
       href="https://wa.me/5233XXXXXXXX?text=Hola,%20quiero%20hacer%20un%20pedido">
       Pedir por WhatsApp
    </a>
</div>

</body>
</html>
